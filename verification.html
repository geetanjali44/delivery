<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Verification</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    width:100%;
    min-height:100vh;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.status-card{
    width:100%;
    max-width:430px;
    background:#fff;
    border-radius:24px;
    padding:28px 22px;
    text-align:center;
    box-shadow:0 12px 35px rgba(0,0,0,.08);
    position:relative;
}

.corner-logout{
    position:absolute;
    top:14px;
    right:14px;
    border:none;
    background:#f3f4f6;
    color:#111827;
    padding:7px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    display:none;
}

.logo{
    font-size:30px;
    font-weight:900;
    color:#16a34a;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    font-size:14px;
    margin-bottom:25px;
}

.icon-circle{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:0 auto 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:55px;
    font-weight:900;
}

.pending{
    background:#fff7db;
    color:#d97706;
    box-shadow:0 0 0 18px rgba(245,158,11,.08);
}

.approved{
    background:#dcfce7;
    color:#16a34a;
    box-shadow:0 0 0 18px rgba(22,163,74,.08);
}

.rejected{
    background:#fee2e2;
    color:#dc2626;
    box-shadow:0 0 0 18px rgba(220,38,38,.08);
}

.notfound{
    background:#e5e7eb;
    color:#374151;
    box-shadow:0 0 0 18px rgba(107,114,128,.08);
}

h1{
    font-size:26px;
    color:#111;
    margin-bottom:10px;
}

.message{
    color:#555;
    font-size:15px;
    line-height:1.5;
    margin-bottom:20px;
}

.details{
    background:#f9fafb;
    border-radius:14px;
    padding:14px;
    text-align:left;
    margin-top:18px;
}

.details p{
    font-size:14px;
    color:#333;
    margin-bottom:8px;
}

.details p:last-child{
    margin-bottom:0;
}

.btn{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    background:#16a34a;
    color:#fff;
    font-size:16px;
    font-weight:700;
    margin-top:20px;
    cursor:pointer;
}

.done-btn{
    background:#16a34a;
    display:none;
}

.apply-btn{
    background:#16a34a;
    display:none;
}
</style>
</head>
<body>

<div class="status-card">

    <button class="corner-logout" id="logoutBtn" onclick="logoutUser()">
        Logout
    </button>

    <div class="logo">CEZOO</div>
    <p class="subtitle">Delivery Partner Verification</p>

    <div id="statusIcon" class="icon-circle pending">⏳</div>

    <h1 id="statusTitle">Checking...</h1>

    <p class="message" id="statusMessage">
        Please wait, we are checking your application status.
    </p>

    <div class="details">
        <p><b>Mobile:</b> <span id="mobileText">Loading...</span></p>
        <p><b>Status:</b> <span id="statusText">Loading...</span></p>
    </div>

    <button class="btn apply-btn" id="applyBtn" onclick="goToDocument()">
        Complete Application
    </button>

    <button class="btn done-btn" id="doneBtn" onclick="goToDashboard()">
        Done
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://fraonjwuarhkwakuitbv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_30MjlIPaYGp3HS0wk7kGbQ_JO7hYUjS";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);

/* IMPORTANT:
   Mobile should come from URL first.
   This makes old user type OTP again from index.html.
*/
let savedMobile = params.get("mobile");

if(!savedMobile){
    window.location.href = "index.html";
}

/* Save mobile only after coming from OTP */
localStorage.setItem("partner_mobile", savedMobile);

const statusIcon = document.getElementById("statusIcon");
const statusTitle = document.getElementById("statusTitle");
const statusMessage = document.getElementById("statusMessage");
const mobileText = document.getElementById("mobileText");
const statusText = document.getElementById("statusText");
const applyBtn = document.getElementById("applyBtn");
const doneBtn = document.getElementById("doneBtn");
const logoutBtn = document.getElementById("logoutBtn");

mobileText.innerText = savedMobile;

function hideAllButtons(){
    applyBtn.style.display = "none";
    doneBtn.style.display = "none";
    logoutBtn.style.display = "none";
}

async function checkApplicationStatus(){

    hideAllButtons();

    const { data, error } = await sb
        .from("delivery_partner_applications")
        .select("mobile,status,created_at")
        .eq("mobile", savedMobile)
        .order("created_at", { ascending:false })
        .limit(1)
        .maybeSingle();

    if(error){
        statusIcon.className = "icon-circle rejected";
        statusIcon.innerText = "!";
        statusTitle.innerText = "Error";
        statusMessage.innerText = error.message;
        statusText.innerText = "Error";

        logoutBtn.style.display = "block";
        return;
    }

    /* New user directly goes to document.html */
    if(!data){
        window.location.href = "document.html?mobile=" + encodeURIComponent(savedMobile);
        return;
    }

    const status = (data.status || "pending").toLowerCase().trim();

    statusText.innerText = status.toUpperCase();

    if(status === "pending"){

        statusIcon.className = "icon-circle pending";
        statusIcon.innerText = "⏳";
        statusTitle.innerText = "Verification Pending";
        statusMessage.innerText = "Your application is submitted successfully. Our team will verify your documents soon.";

        logoutBtn.style.display = "block";
    }
    else if(status === "approved"){

    window.location.replace("order.html");
    return;
}
    else if(status === "rejected"){

        statusIcon.className = "icon-circle rejected";
        statusIcon.innerText = "×";
        statusTitle.innerText = "Application Rejected";
        statusMessage.innerText = "Your application was rejected. Please contact CEZOO support for more details.";

        logoutBtn.style.display = "block";
    }
    else{

        statusIcon.className = "icon-circle pending";
        statusIcon.innerText = "⏳";
        statusTitle.innerText = "Status: " + status;
        statusMessage.innerText = "Your application status is being checked.";

        logoutBtn.style.display = "block";
    }
}

function goToDocument(){
    window.location.href = "document.html?mobile=" + encodeURIComponent(savedMobile);
}

function logoutUser(){
    localStorage.removeItem("partner_mobile");
    window.location.href = "index.html";
}

function goToDashboard(){
    window.location.href = "order.html";
}

checkApplicationStatus();
</script>

</body>
</html>
